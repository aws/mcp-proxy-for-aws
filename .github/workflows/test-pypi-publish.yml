name: Test PyPI Publishing

on:
  workflow_dispatch:

permissions: {}

jobs:
  call-test:
    permissions:
      contents: read
      pull-requests: read
      security-events: write
      actions: read
    with:
      ref: ${{ github.event.release.target_commitish }}
    uses: ./.github/workflows/python.yml

  call-integ-tests:
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: ./.github/workflows/python-integ.yml
    with:
      ref: ${{ github.event.release.target_commitish }}
    secrets: inherit

  build:
    needs: [call-test, call-integ-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # Required for SLSA provenance signing via Sigstore
      attestations: write # Required to write attestations to the GitHub repo
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Build distribution packages
        run: uv build

      - name: Generate SLSA provenance attestations
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: dist/**

      - name: Generate PEP 740 attestations for PyPI
        # Produces .publish.attestation sidecar files in dist/ which uv publish
        # automatically discovers and uploads to PyPI alongside the distributions.
        run: uv tool run --exclude-newer "$(date -d '7 days ago' --utc +%Y-%m-%dT%H:%M:%SZ)" pypi-attestations sign dist/*

      - name: Upload distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/

  deploy-test:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/mcp-proxy-for-aws
    permissions:
      id-token: write
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/
