name: Publish to PyPI

on:
  release:
    types:
      - published

permissions: {}

jobs:
  call-test:
    permissions:
      contents: read
      pull-requests: read
      security-events: write
      actions: read
    uses: ./.github/workflows/python.yml
    with:
      ref: ${{ github.event.release.target_commitish }}

  call-integ-tests:
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: ./.github/workflows/python-integ.yml
    with:
      ref: ${{ github.event.release.target_commitish }}
    secrets: inherit

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v7.1.2

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run pip-audit
        run: uv tool run pip-audit --require-hashes --no-deps -r <(uv export --frozen --no-dev --no-emit-project)

  build:
    needs: [call-test, call-integ-tests, audit]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Build distribution packages
        run: uv build

      - name: Upload distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-proxy-for-aws
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Publish to PyPI
        run: uv publish

  trigger-ecr-publish:
    needs: [build, deploy]
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/ecr-publish-on-release.yml
    secrets: inherit
